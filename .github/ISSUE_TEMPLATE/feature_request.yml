name: Feature request
description: Suggest an improvement for villages, NPCs, logistics, or tooling
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Use this template for feature ideas, balance proposals, and UX improvements.
  - type: textarea
    id: problem
    attributes:
      label: Problem or goal
      description: What player problem are you trying to solve?
      placeholder: Outposts feel static after the first NPC arrives.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature you want
      placeholder: Add a farmer role that keeps nearby crops replanted and supplied.
    validations:
      required: true
  - type: textarea
    id: gameplay
    attributes:
      label: Gameplay impact
      description: Why would this improve the mod?
      placeholder: This would make villages feel more autonomous and expand the supply chain loop.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways to solve the same problem
